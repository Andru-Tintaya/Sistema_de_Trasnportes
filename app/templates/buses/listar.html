{% extends "base.html" %}

{% block content %}
<h1 class="page-title">GESTIÓN DE BUSES</h1>
<p class="page-subtitle">Administre los buses registrados</p>

<a href="{{ url_for('buses.crear') }}" class="btn btn-primary" style="width: auto; margin-bottom: 20px;">+ AGREGAR NUEVO BUS</a>

<div class="card">
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>PLACA</th>
                <th>MODELO</th>
                <th>CAPACIDAD</th>
            </tr>
        </thead>
        <tbody>
            {% for bus in buses %}
            <tr>
                <td>{{ bus.id_bus }}</td>
                <td>{{ bus.placa }}</td>
                <td>{{ bus.modelo }}</td>
                <td>{{ bus.capacidad }} asientos</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
